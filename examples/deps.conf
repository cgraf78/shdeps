# Example shdeps dependency configuration.
# Format: name  method  [cmd]  [aliases]  [filter]
#
# method:     pkg | github:repo | github:release | cargo | go | custom
# cmd:        command to check (defaults to name if omitted or -).
#             Supports mgr:name qualifiers (e.g. apt:batcat).
# aliases:    For pkg: per-manager package name overrides as mgr:name pairs,
#             comma-separated (e.g. apt:fd-find,dnf:fd-find).
#             Use NONE to skip on a platform (e.g. apt:NONE).
# filter:     comma-separated filter tokens with os: or host: prefixes.
#             os: matches platform (linux, macos, wsl). Prefix ! to exclude.
#             host: matches hostname (hostname -s, case-insensitive).

# name                    method           cmd          aliases                  filter
# ────                    ──────           ───          ───────                  ──────

# System packages — installed via brew/apt/dnf/pacman
jq                        pkg
tmux                      pkg
fzf                       pkg
bat                       pkg              apt:batcat
fd                        pkg              apt:fdfind   apt:fd-find,dnf:fd-find
shellcheck                pkg              -            dnf:ShellCheck
unzip                     pkg

# GitHub repos — cloned and kept up to date via git pull
rcaloras/bash-preexec     github:repo

# GitHub releases — latest release binary matched by OS/arch
neovim/neovim             github:release   nvim
mvdan/sh                  github:release   shfmt
jesseduffield/lazygit     github:release

# Rust crates — installed via `cargo install --root ... <crate>`
ripgrep                   cargo            rg
tokei                     cargo

# Go modules — installed via `GOBIN=... go install <module>@latest`
github.com/junegunn/fzf            go
golang.org/x/tools/cmd/goimports   go

# Custom — entirely managed by a post-install hook
nerd-fonts                custom

# Filtered — only installed on specific platforms or hosts
openai/codex              github:release   -            -                        host:nas
