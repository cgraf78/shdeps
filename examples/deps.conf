# Example shdeps dependency configuration.
# Format: name  method  [cmd]  [cmd_alt]  [pkg_overrides]  [repo]  [platforms]  [hosts]
#
# method:         pkg | git | binary | custom
# cmd:            binary to check (defaults to name if omitted or -)
# cmd_alt:        alternate binary on some OSes (e.g. batcat for bat)
# pkg_overrides:  OS-specific package names as mgr:name pairs, comma-separated
#                 Use NONE to skip on a platform (e.g. apt:NONE).
# repo:           GitHub owner/repo (for git/binary methods)
# platforms:      comma-separated platform filter. Values: linux, macos, wsl.
#                 Prefix with ! to exclude (e.g. !wsl).
# hosts:          comma-separated hostname filter. Matches against short hostname
#                 (hostname -s), case-insensitive. Prefix with ! to exclude.

# name          method    cmd         cmd_alt   overrides                             repo                   platforms   hosts
# ────          ──────    ───         ───────   ─────────                             ────                   ─────────   ─────

# System packages — installed via brew/apt/dnf/pacman
jq              pkg
tmux            pkg
fzf             pkg
bat             pkg       bat         batcat
fd              pkg       fd          fdfind    apt:fd-find,dnf:fd-find
ripgrep         pkg       rg
shellcheck      pkg       -           -         dnf:ShellCheck
unzip           pkg

# Git-based tools — cloned from GitHub
bash-preexec    git       -           -         -                                     rcaloras/bash-preexec

# GitHub release binaries — latest release matched by OS/arch
neovim          binary    nvim        -         -                                     neovim/neovim
shfmt           binary    -           -         -                                     mvdan/sh
lazygit         binary    -           -         -                                     jesseduffield/lazygit

# Custom — entirely managed by a post-install hook
nerd-fonts      custom

# Host-specific — only installed on named machines
codex           binary    -           -         -                                     openai/codex           -           nas
