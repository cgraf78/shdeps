name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
          - name: Ubuntu
            runner: ubuntu-latest
          - name: Debian
            runner: ubuntu-latest
            container: debian:stable
          - name: Arch
            runner: ubuntu-latest
            container: archlinux:latest
          - name: CentOS Stream
            runner: ubuntu-latest
            container: quay.io/centos/centos:latest
          - name: Fedora
            runner: ubuntu-latest
            container: fedora:latest
          - name: Alpine
            runner: ubuntu-latest
            container: alpine:latest
          - name: WSL
            runner: ubuntu-latest

    name: ${{ matrix.name }}
    steps:
      - name: Install system prereqs
        if: matrix.container || matrix.name == 'macOS'
        shell: sh
        run: |
          case "${{ matrix.name }}" in
            macOS)
              brew install bash shellcheck
              ;;
            Debian)
              apt-get update && apt-get install -y git curl sudo shellcheck
              ;;
            Arch)
              pacman-key --init && pacman-key --populate
              pacman -Syu --noconfirm git curl sudo shellcheck
              ;;
            CentOS*)
              dnf install -y --allowerasing git curl sudo epel-release
              dnf install -y --allowerasing ShellCheck
              ;;
            Fedora)
              dnf install -y --allowerasing git curl sudo ShellCheck
              ;;
            Alpine)
              apk add --no-cache git curl sudo bash coreutils shellcheck
              ;;
          esac

      - name: Install shellcheck (Ubuntu/WSL)
        if: "!matrix.container && matrix.name != 'macOS'"
        run: sudo apt-get install -y shellcheck

      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Simulate WSL environment
        if: matrix.name == 'WSL'
        run: |
          echo 'Linux version 5.15.0 (Microsoft@Microsoft.com)' > /tmp/wsl-proc-version
          sudo mount --bind /tmp/wsl-proc-version /proc/version

      - name: Set HOME to workspace
        run: echo "HOME=$(pwd)" >> "$GITHUB_ENV"

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$(pwd)"

      - name: Run tests
        run: ./test/shdeps-test
